server:
  port: 8081

spring:
  application:
    name: skillforge-hero

guild:
  github:
    owner: skillforge-guild   # change to your GitHub org/user
    repo: skillforge           # change to your repo name
    token: ${GITHUB_TOKEN:}    # required for guild hub (write operations)
  hub:
    enabled: false             # set true on the central guild hub node only

logging:
  level:
    com.skillforge: INFO