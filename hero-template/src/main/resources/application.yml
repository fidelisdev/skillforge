server:
  port: 8081

spring:
  application:
    name: skillforge-hero

guild:
  github:
    owner: skillforge-guild   # change to your GitHub org/user
    repo: skillforge           # change to your repo name
    token: ${GITHUB_TOKEN:}    # optional — 60 req/hour without, 5000 with

logging:
  level:
    com.skillforge: INFO